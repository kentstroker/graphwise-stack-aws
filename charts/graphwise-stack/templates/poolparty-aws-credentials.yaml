{{- $gs := index .Values "graphrag-secrets" -}}
{{- $pp := index .Values "poolparty" -}}
{{- $pplm := $pp.llm | default dict -}}
{{- if $pplm.enabled }}
{{/*
AWS credentials Secret for the PoolParty pod (graphwise namespace).

PoolParty 10.2+ supports a pluggable LLM provider used by "Build Your
Taxonomy" (Taxonomy Advisor) and related AI features. For Bedrock,
the AWS SDK's default credential chain reads AWS_REGION /
AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars on the PoolParty
container -- those env vars come from this Secret.

Why a separate Secret in graphwise ns (vs. mounting the existing
graphrag-components-aws-credentials in graphrag ns): pods can only
mount Secrets from their own namespace. PoolParty lives in graphwise,
graphrag-components lives in graphrag, so we materialize the same
credential pair twice. Both copies are derived from the SAME overlay
block (graphrag-secrets.awsCredentials in ~/graphwise-secrets.yaml)
so there's still one source of truth.

The IAM key behind these creds needs bedrock:InvokeModel on the model
ARN -- SETUP §4b's inline policy lists both
anthropic.claude-sonnet-4-5-20250929-v1:0 (this Secret's consumer)
and cohere.embed-english-v3 (graphrag-components' consumer).

Gated on .Values.poolparty.llm.enabled so umbrella-only deploys that
don't want the LLM wired don't even create the Secret. The
companion env-var wiring in charts/poolparty/templates/deployment.yaml
is gated the same way.
*/}}
---
apiVersion: v1
kind: Secret
metadata:
  # PoolParty's own namespace is always `graphwise` (the umbrella's
  # release namespace). The graphrag-secrets block in values points
  # at the graphrag namespace, but that's irrelevant here -- this
  # Secret has to live alongside the PoolParty pod that mounts it.
  name: {{ $pplm.awsCredentialsSecret | default "poolparty-aws-credentials" }}
  namespace: graphwise
  labels:
    {{- include "graphwise-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_REGION:            {{ $gs.awsCredentials.region | quote }}
  AWS_ACCESS_KEY_ID:     {{ $gs.awsCredentials.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ $gs.awsCredentials.secretAccessKey | quote }}
{{- end }}
