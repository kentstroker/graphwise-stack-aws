{{- if .Values.security.enabled }}
{{/*
Post-install/upgrade Helm hook: enables GraphDB-native security and
rotates the default admin password to the value in <fullname>-admin
Secret key `password`. Implements the locked 6-step Pattern B sequence
from docs/superpowers/specs/2026-05-21-graphdb-adeptnova-design.md:

  1. Wait for /rest/repositories (security still OFF).
  2. GET /rest/security -- if "true", skip enable + jump to step 4.
  3. POST /rest/security body literal `true` -> 200. Default admin/root.
  4. GET /rest/security/users/admin authed as admin:<target> --
     if 200, password already rotated, exit success.
  5. PATCH /rest/security/users/admin authed as admin:root,
     body {"password":"<target>"} -> 200.
  6. GET /rest/security/users/admin authed as admin:<target> -> 200.

Idempotent under helm upgrade re-trigger and mid-Job pod restart.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "graphdb.fullname" . }}-security-init
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "graphdb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "graphdb.labels" . | nindent 8 }}
        app.kubernetes.io/component: security-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: {{ .Values.security.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: GRAPHDB_URL
              value: "http://{{ include "graphdb.fullname" . }}:{{ .Values.service.port }}"
            - name: DEFAULT_ADMIN_PW
              value: {{ .Values.security.defaultAdminPassword | quote }}
            - name: TARGET_ADMIN_PW
              valueFrom:
                secretKeyRef:
                  name: {{ include "graphdb.fullname" . }}-admin
                  key: password
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache curl >/dev/null

              # Step 1: wait for server ready. Accept 200 (security still
              # OFF), 401, or 403 (security already ON from a prior install).
              # Cannot use `curl -sf` here because `-f` rejects 4xx and
              # would make this loop never succeed on a `helm upgrade`
              # re-trigger once security is already enabled -- eating the
              # full backoffLimit before the Job gives up.
              echo "Waiting for GraphDB at $GRAPHDB_URL/rest/repositories ..."
              for i in $(seq 1 60); do
                  code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 \
                      "$GRAPHDB_URL/rest/repositories" || echo "000")
                  case "$code" in
                      200|401|403)
                          echo "  GraphDB up after $i attempt(s) (HTTP $code)"
                          break ;;
                  esac
                  [ "$i" = "60" ] && { echo "ERROR: GraphDB never came up (5min)" >&2; exit 1; }
                  sleep 5
              done

              # Step 2: idempotency probe -- is security already on?
              # Once security is ON, GET /rest/security still returns the
              # current state (no auth required for the status read in
              # GraphDB 11.3), so this probe works in both lifecycle states.
              SEC_STATE=$(curl -s --max-time 5 "$GRAPHDB_URL/rest/security" || echo "")
              echo "Step 2: GET /rest/security -> '$SEC_STATE'"
              case "$SEC_STATE" in
                  true|\"true\") echo "  security already ON; skipping step 3"; SKIP_ENABLE=1 ;;
                  *)             SKIP_ENABLE=0 ;;
              esac

              # Step 3: enable security (if not already on)
              if [ "$SKIP_ENABLE" = "0" ]; then
                  echo "Step 3: enabling security ..."
                  code=$(curl -s -o /tmp/r3 -w '%{http_code}' \
                      -X POST -H 'Content-Type: application/json' \
                      --data 'true' "$GRAPHDB_URL/rest/security")
                  echo "  POST /rest/security true -> HTTP $code"
                  if [ "$code" != "200" ] && [ "$code" != "204" ]; then
                      cat /tmp/r3 >&2
                      exit 1
                  fi
              fi

              # Step 4: idempotency probe -- does the target password already
              # work AND does the user still have ROLE_ADMIN? We MUST check
              # the role here, not just authentication. GraphDB 11's PATCH
              # endpoint is not true-partial-merge: a body that omits
              # `grantedAuthorities` clears the authorities list, leaving
              # an admin user that authenticates but can't use the Workbench
              # (Spring 403s every API call; the JS translation bundle
              # fails to load so the UI shows literal i18n keys). Verifying
              # the role here means a Job re-run after we've fixed step 5
              # actually re-PATCHes the broken user instead of exiting
              # success on a partial-broken state.
              USER_JSON=$(curl -s --max-time 5 \
                  -u "admin:$TARGET_ADMIN_PW" \
                  -H 'Accept: application/json' \
                  "$GRAPHDB_URL/rest/security/users/admin" || echo "")
              if echo "$USER_JSON" | grep -q 'ROLE_ADMIN'; then
                  echo "Step 4: target password works AND ROLE_ADMIN present; exit success"
                  exit 0
              fi
              echo "Step 4: need to (re-)PATCH admin (response so far: ${USER_JSON:0:120})"

              # Step 5: rotate admin password AND guarantee ROLE_ADMIN.
              # The body MUST include `grantedAuthorities` -- otherwise
              # GraphDB 11's PATCH wipes the role (see Step 4 comment).
              # Auth: try DEFAULT_ADMIN_PW first (fresh install). If that
              # 401s, this is a recovery from an already-rotated-but-
              # broken state, so fall back to TARGET_ADMIN_PW.
              PATCH_BODY="{\"password\":\"$TARGET_ADMIN_PW\",\"grantedAuthorities\":[\"ROLE_ADMIN\"]}"
              echo "Step 5: rotating admin password + granting ROLE_ADMIN ..."
              code=$(curl -s -o /tmp/r5 -w '%{http_code}' \
                  -X PATCH -H 'Content-Type: application/json' \
                  -u "admin:$DEFAULT_ADMIN_PW" \
                  --data "$PATCH_BODY" \
                  "$GRAPHDB_URL/rest/security/users/admin")
              echo "  PATCH admin (auth=default) -> HTTP $code"
              if [ "$code" = "401" ] || [ "$code" = "403" ]; then
                  echo "  default auth rejected; retrying as admin:<target> (recovery from broken state)"
                  code=$(curl -s -o /tmp/r5 -w '%{http_code}' \
                      -X PATCH -H 'Content-Type: application/json' \
                      -u "admin:$TARGET_ADMIN_PW" \
                      --data "$PATCH_BODY" \
                      "$GRAPHDB_URL/rest/security/users/admin")
                  echo "  PATCH admin (auth=target) -> HTTP $code"
              fi
              if [ "$code" != "200" ] && [ "$code" != "204" ]; then
                  cat /tmp/r5 >&2
                  exit 1
              fi

              # Step 6: verify role is actually present after the PATCH.
              USER_JSON=$(curl -s --max-time 5 \
                  -u "admin:$TARGET_ADMIN_PW" \
                  -H 'Accept: application/json' \
                  "$GRAPHDB_URL/rest/security/users/admin" || echo "")
              if echo "$USER_JSON" | grep -q 'ROLE_ADMIN'; then
                  echo "Step 6: admin authenticates with target password AND has ROLE_ADMIN."
              else
                  echo "ERROR: post-PATCH admin is missing ROLE_ADMIN." >&2
                  echo "  user JSON: $USER_JSON" >&2
                  exit 1
              fi

              echo "Done. Security ON; admin password + role seeded from Secret."
{{- end }}
