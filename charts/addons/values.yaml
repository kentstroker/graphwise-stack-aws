# addons — defaults for each sub-chart. Toggle with <name>.enabled.
# Hostnames + Keycloak URL filled in by the umbrella graphwise-stack
# values overlay (per-deployment subdomain).

adf:
  enabled: true
  image:
    repository: ontotext/adf
    tag: "1.8.2"
  externalUrl: ""           # https://adf.<sub>.<base>
  keycloak:
    url: ""                 # https://auth.<sub>.<base>/
    realm: poolparty
    clientSecret: "ohIP3x4XuoCsGDsGlZRvNvO5VN6veFb5"
  poolparty:
    internalUrl: "http://graphwise-stack-poolparty:8081"

semantic-workbench:
  enabled: true
  image:
    repository: ontotext/semantic-workbench
    tag: "2.4.2"
  externalUrl: ""
  keycloak:
    url: ""
    realm: poolparty
    clientSecret: "ohIP3x4XuoCsGDsGlZRvNvO5VN6veFb5"
  poolparty:
    internalUrl: "http://graphwise-stack-poolparty:8081"
  license:
    secretName: poolparty-license
    secretKey: poolparty.key

graphviews:
  enabled: true
  image:
    repository: ontotext/graphviews
    tag: "1.0.0"
  externalUrl: ""
  poolparty:
    internalUrl: "http://graphwise-stack-poolparty:8081"
    superadminPassword: "poolparty"

rdf4j:
  enabled: true
  image:
    repository: eclipse/rdf4j-workbench
    tag: "5.1.2"
  externalUrl: ""
  basicAuth:
    enabled: true
    htpasswd: "demo:$apr1$1Ub6kYrD$xxG9zJZXPddeN2WT8E/Ro/"

unifiedviews:
  enabled: true
  image:
    repository: ontotext/unifiedviews
    tag: "10.2.0"
  externalUrl: ""
  license:
    secretName: unifiedviews-license
    secretKey: uv-license.key

refine:
  enabled: true
  image:
    repository: ontotext/refine
    tag: "1.2.2"
  externalUrl: ""           # https://refine.<sub>.<base>
  # CIDR allowlist for the Ingress (terraform.tfvars admin_cidr).
  # Empty -> annotation omitted -> ingress open. render-values.sh
  # populates this on every deploy.
  allowedCidrs: []
  graphdb:
    # Display-only; surfaced on the console card. No env wiring.
    internalUrl: "http://graphwise-stack-graphdb-projects:7200"
